name: 📊 Crypto Probability Analysis Report

on:
  workflow_dispatch:
    inputs:

      # ── SYMBOL ──────────────────────────────────────────
      symbol:
        description: "Crypto Symbol"
        required: true
        default: "BTCUSDT"
        type: choice
        options:
          - BTCUSDT
          - ETHUSDT
          - SOLUSDT
          - BNBUSDT
          - XRPUSDT
          - DOGEUSDT
          - ADAUSDT
          - AVAXUSDT
          - LINKUSDT
          - MATICUSDT

      # ── CANDLE TIMEFRAME (sub-candle resolution for P1/P2 detection) ────
      candle_timeframe:
        description: "Sub-Candle Timeframe (resolution used to detect when P1/P2 form)"
        required: true
        default: "15m"
        type: choice
        options:
          - 1m
          - 3m
          - 5m
          - 15m
          - 30m
          - 1h
          - 4h
          - 8h

      # ── PIVOT TIMEFRAME (the period whose P1/P2 we analyze) ────────────
      pivot_timeframe:
        description: "Pivot Timeframe (the candle period to compute P1/P2 stats for)"
        required: true
        default: "1d"
        type: choice
        options:
          - 1h
          - 4h
          - 8h
          - 1d
          - 3d
          - 1w

      # ── LOOKBACK PERIOD ──────────────────────────────────────────────────
      lookback_period:
        description: "Historical Lookback Period for Statistics"
        required: true
        default: "1Y"
        type: choice
        options:
          - 1W
          - 2W
          - 1M
          - 3M
          - 6M
          - 1Y
          - 2Y
          - 3Y
          - 5Y

      # ── ANALYSIS TYPE ────────────────────────────────────────────────────
      analysis_type:
        description: "Analysis Module to Run"
        required: true
        default: "complete"
        type: choice
        options:
          - time
          - distance
          - summary
          - complete

      # ── OUTPUT FORMAT ────────────────────────────────────────────────────
      output_format:
        description: "Report Output Format"
        required: true
        default: "markdown"
        type: choice
        options:
          - markdown
          - json
          - both

      # ── BINANCE API KEY (OPTIONAL) ───────────────────────────────────────
      binance_api_key:
        description: "Binance API Key (OPTIONAL — leave blank, public data works without it)"
        required: false
        default: ""
        type: string

jobs:
  analyze:
    name: "📈 Run Probability Analysis"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. CHECKOUT ──────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ── 2. PYTHON SETUP ───────────────────────────────────────────────────
      #    IMPORTANT: Do NOT use cache: "pip" here — that requires a
      #    requirements.txt or pyproject.toml in the repo. This workflow is
      #    fully self-contained and generates its own script at runtime.
      - name: Set Up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. INSTALL DEPENDENCIES ──────────────────────────────────────────
      #    Only lightweight pure-Python libs — no API auth library needed.
      #    Binance public klines endpoint works with plain requests (no key).
      - name: Install Python Dependencies
        run: |
          pip install --upgrade pip
          pip install pandas numpy scipy tabulate requests

      # ── 4. WRITE THE ANALYSIS SCRIPT ─────────────────────────────────────
      - name: Write Analysis Script
        shell: bash
        run: |
          cat > /tmp/analyze.py << 'PYEOF'
          import requests, pandas as pd, numpy as np
          from scipy import stats as scipy_stats
          import json, sys, os, time
          from datetime import datetime, timezone, timedelta

          SYMBOL        = os.environ.get("SYMBOL",        "BTCUSDT")
          CANDLE_TF     = os.environ.get("CANDLE_TF",     "15m")
          PIVOT_TF      = os.environ.get("PIVOT_TF",      "1d")
          LOOKBACK      = os.environ.get("LOOKBACK",      "1Y")
          ANALYSIS_TYPE = os.environ.get("ANALYSIS_TYPE", "complete")
          API_KEY       = os.environ.get("BINANCE_API_KEY", "").strip()
          OUTPUT_FORMAT = os.environ.get("OUTPUT_FORMAT", "markdown")

          LOOKBACK_DAYS = {"1W":7,"2W":14,"1M":30,"3M":90,"6M":180,
                           "1Y":365,"2Y":730,"3Y":1095,"5Y":1825}
          TF_MINUTES    = {"1m":1,"3m":3,"5m":5,"15m":15,"30m":30,
                           "1h":60,"4h":240,"8h":480,"1d":1440,"3d":4320,"1w":10080}
          BINANCE_TF    = {"1m":"1m","3m":"3m","5m":"5m","15m":"15m","30m":"30m",
                           "1h":"1h","4h":"4h","8h":"8h","1d":"1d","3d":"3d","1w":"1w"}

          lookback_days  = LOOKBACK_DAYS.get(LOOKBACK, 365)
          pivot_minutes  = TF_MINUTES.get(PIVOT_TF, 1440)
          candle_minutes = TF_MINUTES.get(CANDLE_TF, 15)
          bin_size       = max(candle_minutes, 15)

          print(f"\n{'='*60}")
          print(f"  CryptoStat Probability Engine")
          print(f"{'='*60}")
          print(f"  Symbol    : {SYMBOL}")
          print(f"  Pivot TF  : {PIVOT_TF} ({pivot_minutes} min)")
          print(f"  Sub-TF    : {CANDLE_TF} ({candle_minutes} min)")
          print(f"  Lookback  : {LOOKBACK} ({lookback_days} days)")
          print(f"  Analysis  : {ANALYSIS_TYPE}")
          print(f"  Auth API  : {'YES' if API_KEY else 'NO — using public endpoints'}")
          print(f"{'='*60}\n")

          BASE = "https://fapi.binance.com"

          def fetch_klines(symbol, interval, start_ms, end_ms=None):
              url    = f"{BASE}/fapi/v1/klines"
              hdrs   = {"User-Agent": "CryptoStat/1.0"}
              if API_KEY:
                  hdrs["X-MBX-APIKEY"] = API_KEY
              result, since = [], start_ms
              print(f"  Fetching {symbol} {interval} ...", end="", flush=True)
              while True:
                  params = {"symbol": symbol, "interval": interval,
                            "startTime": since, "limit": 1000}
                  if end_ms:
                      params["endTime"] = end_ms
                  try:
                      r = requests.get(url, params=params, headers=hdrs, timeout=30)
                      r.raise_for_status()
                      batch = r.json()
                  except requests.HTTPError as e:
                      print(f"\n  HTTP Error {r.status_code}: {r.text[:200]}")
                      sys.exit(1)
                  except Exception as e:
                      print(f"\n  Request failed: {e}")
                      sys.exit(1)
                  if not batch:
                      break
                  result.extend(batch)
                  print(".", end="", flush=True)
                  if len(batch) < 1000:
                      break
                  since = batch[-1][0] + 1
                  time.sleep(0.12)
              print(f" {len(result)} candles OK")
              if not result:
                  return pd.DataFrame(columns=["ts","open","high","low","close","volume"])
              df = pd.DataFrame(result, columns=["ts","open","high","low","close","volume",
                  "close_time","qvol","trades","tbb","tbq","ign"])
              df = df[["ts","open","high","low","close","volume"]].copy()
              for c in ["open","high","low","close","volume"]:
                  df[c] = pd.to_numeric(df[c], errors="coerce")
              df["ts"] = pd.to_datetime(df["ts"], unit="ms", utc=True)
              return df.drop_duplicates("ts").sort_values("ts").reset_index(drop=True)

          now      = datetime.now(timezone.utc)
          start_ms = int((now - timedelta(days=lookback_days)).timestamp() * 1000)
          end_ms   = int(now.timestamp() * 1000)

          df_sub = fetch_klines(SYMBOL, BINANCE_TF[CANDLE_TF], start_ms, end_ms)
          if df_sub.empty:
              print("  No data returned. Check symbol (e.g. BTCUSDT) and try again.")
              sys.exit(1)

          current_price = float(df_sub.iloc[-1]["close"])
          print(f"  Current price : ${current_price:,.2f}")
          print(f"  Sub-candle rows: {len(df_sub)}")

          # ── P1/P2 LABELING ────────────────────────────────────────────────
          def label_p1_p2(sub_df, pivot_tf_str, pivot_mins):
              RESAMP = {"1h":"1h","4h":"4h","8h":"8h","1d":"1D",
                        "3d":"3D","1w":"1W"}
              rs = RESAMP.get(pivot_tf_str, "1D")
              pg = (sub_df.set_index("ts").resample(rs)
                    .agg(open=("open","first"), high=("high","max"),
                         low=("low","min"),   close=("close","last"))
                    .dropna(subset=["open"]))
              rows, starts = [], list(pg.index)
              for i, ps in enumerate(starts[:-1]):
                  pe   = starts[i+1]
                  sub  = sub_df[(sub_df["ts"] >= ps) & (sub_df["ts"] < pe)].copy()
                  if len(sub) < 2:
                      continue
                  ht = sub.loc[sub["high"].idxmax(), "ts"]
                  lt = sub.loc[sub["low"].idxmin(),  "ts"]
                  ch = float(sub["high"].max())
                  cl = float(sub["low"].min())
                  if ht <= lt:
                      p1t, p2t, p1tm, p2tm = "HIGH","LOW", ht, lt
                  else:
                      p1t, p2t, p1tm, p2tm = "LOW","HIGH", lt, ht
                  p1o = max(0.0, (p1tm - ps).total_seconds()/60)
                  p2o = max(0.0, (p2tm - ps).total_seconds()/60)
                  rng = (ch - cl) / cl * 100 if cl > 0 else 0
                  rows.append({"date":ps,"p1_type":p1t,"p2_type":p2t,
                                "p1_offset_mins":p1o,"p2_offset_mins":p2o,
                                "full_range_pct":rng,"candle_high":ch,"candle_low":cl,
                                "open":float(pg.loc[ps,"open"]),
                                "close":float(pg.loc[ps,"close"])})
              return pd.DataFrame(rows)

          print("\n  Labeling P1/P2 patterns ...")
          labeled = label_p1_p2(df_sub, PIVOT_TF, pivot_minutes)
          print(f"  {len(labeled)} completed {PIVOT_TF} candles labeled")
          if len(labeled) < 10:
              print("  Too few samples (<10). Use a longer lookback or shorter pivot TF.")
              sys.exit(1)

          # ── CURRENT CANDLE ────────────────────────────────────────────────
          def candle_start(tf, now):
              if tf == "1h":   return now.replace(minute=0, second=0, microsecond=0)
              if tf == "4h":   h=(now.hour//4)*4; return now.replace(hour=h,minute=0,second=0,microsecond=0)
              if tf == "8h":   h=(now.hour//8)*8; return now.replace(hour=h,minute=0,second=0,microsecond=0)
              return now.replace(hour=0, minute=0, second=0, microsecond=0)

          cs           = candle_start(PIVOT_TF, now)
          elapsed_mins = (now - cs).total_seconds() / 60
          elapsed_pct  = min(elapsed_mins / pivot_minutes * 100, 100)
          cur          = df_sub[df_sub["ts"] >= cs].copy()

          if not cur.empty:
              cur_high = float(cur["high"].max())
              cur_low  = float(cur["low"].min())
              cur_rng  = (cur_high - cur_low) / cur_low * 100 if cur_low > 0 else 0
              ht = cur.loc[cur["high"].idxmax(), "ts"]
              lt = cur.loc[cur["low"].idxmin(),  "ts"]
              cur_p1   = "HIGH" if ht <= lt else "LOW"
              p1_ok    = True
          else:
              cur_high = cur_low = current_price
              cur_rng  = 0; cur_p1 = "UNKNOWN"; p1_ok = False

          # ── STATISTICS ────────────────────────────────────────────────────
          def time_stats(labeled, pmins, bsz):
              bins = list(range(0, int(pmins)+bsz, bsz))
              p1a = labeled["p1_offset_mins"].clip(0, pmins-0.1).values
              p2a = labeled["p2_offset_mins"].clip(0, pmins-0.1).values
              h1,_ = np.histogram(p1a, bins=bins)
              h2,_ = np.histogram(p2a, bins=bins)
              n = len(labeled); rows=[]; c1=c2=0
              for i in range(len(bins)-1):
                  p1p=h1[i]/n*100; p2p=h2[i]/n*100; c1+=p1p; c2+=p2p
                  s,e = int(bins[i]),int(bins[i+1])
                  lbl = f"{s//60:02d}h{s%60:02d}m-{e//60:02d}h{e%60:02d}m"
                  rows.append({"bin":lbl,"bin_start":bins[i],"bin_end":bins[i+1],
                                "p1_prob":round(p1p,1),"p2_prob":round(p2p,1),
                                "p1_cum":round(c1,1),"p2_cum":round(c2,1)})
              return rows

          def dist_stats(labeled, cur_rng):
              rng = labeled["full_range_pct"].dropna().values
              pr  = float(scipy_stats.percentileofscore(rng, cur_rng))
              def pct(p): return round(float(np.percentile(rng,p)),3)
              return {"p10":pct(10),"p25":pct(25),"p50":pct(50),"p75":pct(75),
                      "p90":pct(90),"p95":pct(95),"mean":round(float(rng.mean()),3),
                      "std":round(float(rng.std()),3),"sample_n":len(rng),
                      "current_range":round(cur_rng,3),"current_percentile":round(pr,1),
                      "low_first_pct":round(float((labeled["p1_type"]=="LOW").mean()*100),1),
                      "high_first_pct":round(float((labeled["p1_type"]=="HIGH").mean()*100),1),
                      "gap_to_median":round(pct(50)-cur_rng,3),
                      "gap_to_p75":round(pct(75)-cur_rng,3)}

          print("  Computing statistics ...")
          tr = time_stats(labeled, pivot_minutes, bin_size)
          ds = dist_stats(labeled, cur_rng)

          cur_bin="—"; p2win=0.0; p2rem=0.0
          for row in tr:
              if row["bin_start"] <= elapsed_mins < row["bin_end"]:
                  cur_bin=row["bin"]; p2win=row["p2_prob"]
              if row["bin_start"] >= elapsed_mins:
                  p2rem += row["p2_prob"]

          def bar(pct, w=20):
              f=max(0,int(round(pct/100*w)))
              return "█"*f+"░"*(w-f)

          def build_report():
              L=[]
              L += [f"# 📊 {SYMBOL} Probability Analysis Report",""]
              L += [f"| Field | Value |","|-------|-------|",
                    f"| Generated | `{now.strftime('%Y-%m-%d %H:%M:%S UTC')}` |",
                    f"| Symbol | `{SYMBOL}` Binance USDT-M Perp Futures |",
                    f"| Pivot TF | `{PIVOT_TF}` |",
                    f"| Sub-Candle TF | `{CANDLE_TF}` |",
                    f"| Lookback | `{LOOKBACK}` ({lookback_days} days, {len(labeled)} samples) |",
                    f"| Current Price | `${current_price:,.2f}` |",""]

              L += ["---",f"## 🕐 Current {PIVOT_TF.upper()} Candle Status","",
                    "| Metric | Value |","|--------|-------|",
                    f"| Candle Start | `{cs.strftime('%Y-%m-%d %H:%M UTC')}` |",
                    f"| Elapsed | `{int(elapsed_mins//60)}h {int(elapsed_mins%60)}m` ({elapsed_pct:.1f}% of candle) |",
                    f"| High (so far) | `${cur_high:,.2f}` |",
                    f"| Low  (so far) | `${cur_low:,.2f}` |",
                    f"| Range (so far) | `{cur_rng:.3f}%` |",
                    f"| P1 Type | `{cur_p1}` ({'✅ confirmed' if p1_ok else '⏳ pending'}) |",
                    f"| Range Percentile | **{ds['current_percentile']}th** vs history |",""]

              if ANALYSIS_TYPE in ("time","complete"):
                  L += ["---",f"## ⏱️ TIME ANALYSIS — {PIVOT_TF.upper()} | {LOOKBACK} Lookback","",
                        f"> When do P1 and P2 form within the {PIVOT_TF} candle?","","```"]
                  hdr=f"{'Time Window':<24} {'P1%':>5}  {'P1 Distribution':<22} {'P2%':>5}  {'P2 Distribution':<22} {'P2Cum':>7}"
                  L.append(hdr); L.append("─"*len(hdr))
                  for row in tr:
                      mk=" ◄ NOW" if row["bin"]==cur_bin else ""
                      L.append(f"{row['bin']:<24} {row['p1_prob']:>4.1f}%  {bar(row['p1_prob']):<22}"
                               f" {row['p2_prob']:>4.1f}%  {bar(row['p2_prob']):<22} {row['p2_cum']:>5.1f}%{mk}")
                  L += ["```","",
                        f"- Current window: **`{cur_bin}`**",
                        f"- P2 probability in current window: `{p2win:.1f}%`",
                        f"- P2 probability still remaining: `{p2rem:.1f}%`",
                        f"- P1 peak window: `{max(tr,key=lambda x:x['p1_prob'])['bin']}`",
                        f"- P2 peak window: `{max(tr,key=lambda x:x['p2_prob'])['bin']}`",""]

              if ANALYSIS_TYPE in ("distance","complete"):
                  mx = ds["p95"] if ds["p95"]>0 else 1
                  L += ["---",f"## 📏 DISTANCE ANALYSIS — {PIVOT_TF.upper()} | {LOOKBACK} Lookback","",
                        f"> How far does price travel within the {PIVOT_TF} candle?","","```",
                        f"Historical {PIVOT_TF.upper()} Range Distribution (N={ds['sample_n']} candles)",""]
                  for lbl,key in [("10th pct","p10"),("25th pct","p25"),("Median  ","p50"),
                                   ("75th pct","p75"),("90th pct","p90"),("95th pct","p95")]:
                      v=ds[key]; tag="  ← median" if key=="p50" else ""
                      L.append(f"  {lbl}: {v:>6.3f}%  {bar(v/mx*100,30)}{tag}")
                  L.append(f"\n  Mean: {ds['mean']:.3f}%  Std: {ds['std']:.3f}%\n")
                  cb=max(0,int(cur_rng/mx*30)) if mx>0 else 0
                  L.append(f"  CURRENT : {cur_rng:>6.3f}%  {'█'*cb}{'░'*(30-cb)}  ← {ds['current_percentile']}th pct")
                  L += ["```","",
                        f"- Range at **{ds['current_percentile']}th percentile**",
                        f"- {'BELOW median — needs +'+str(ds['gap_to_median'])+'% more' if ds['gap_to_median']>0 else 'ABOVE median — already extended'}",
                        f"- {'75th pct needs +'+str(ds['gap_to_p75'])+'% more' if ds['gap_to_p75']>0 else 'EXCEEDED 75th pct — high volatility territory'}","",
                        "| Pattern | Freq | Meaning |","|---------|------|---------|",
                        f"| Low first → High | **{ds['low_first_pct']}%** | Bullish {PIVOT_TF} |",
                        f"| High first → Low | **{ds['high_first_pct']}%** | Bearish {PIVOT_TF} |",
                        f"| **Current P1={cur_p1}** | **{ds['low_first_pct'] if cur_p1=='LOW' else ds['high_first_pct']}%** | matches history |",""]

              if ANALYSIS_TYPE in ("summary","complete"):
                  ts = "EXTENDED" if elapsed_pct>80 else "PRIME" if 25<=elapsed_pct<=75 else "EARLY"
                  dst= "EXTENDED" if ds["current_percentile"]>75 else "COMPRESSED" if ds["current_percentile"]<25 else "NORMAL"
                  pb = ("BULLISH" if cur_p1=="LOW" and ds["low_first_pct"]>52
                        else "BEARISH" if cur_p1=="HIGH" and ds["high_first_pct"]>52 else "NEUTRAL")
                  L += ["---","## 📋 SUMMARY — Composite Probability Assessment","","```",
                        "  ┌─────────────────────────────────────────────────────────┐",
                        "  │            COMPOSITE PROBABILITY SUMMARY                │",
                        "  ├─────────────────────────────────────────────────────────┤",
                        f"  │  Symbol      : {SYMBOL:<12} Pivot TF : {PIVOT_TF:<12}      │",
                        f"  │  Lookback    : {LOOKBACK:<12} Samples  : {len(labeled):<12}      │",
                        "  ├─────────────────────────────────────────────────────────┤",
                        f"  │  TIME STATUS     : {ts:<37}│",
                        f"  │  DISTANCE STATUS : {dst:<37}│",
                        f"  │  PATTERN BIAS    : {pb:<37}│",
                        "  ├─────────────────────────────────────────────────────────┤",
                        f"  │  P1 Type         : {cur_p1:<37}│",
                        f"  │  P1 Confirmed    : {'YES ✅' if p1_ok else 'NO ⏳':<37}│",
                        f"  │  P2 Prob Remain  : {str(round(p2rem,1))+'% window still open':<37}│",
                        f"  │  Range Rank      : {str(ds['current_percentile'])+'th pct ('+dst+')':<37}│",
                        "  └─────────────────────────────────────────────────────────┘",
                        "```",""]
                  if p1_ok and cur_p1 in ("LOW","HIGH"):
                      L += ["**Statistical Price Targets:**","",
                            "| Target | Distance | Price |","|--------|----------|-------|"]
                      for tl,tk in [("25th pct","p25"),("Median","p50"),("75th pct","p75"),("90th pct","p90")]:
                          d=ds[tk]
                          if cur_p1=="LOW":
                              L.append(f"| {tl} | +{d:.3f}% | `${cur_low*(1+d/100):,.2f}` |")
                          else:
                              L.append(f"| {tl} | -{d:.3f}% | `${cur_high*(1-d/100):,.2f}` |")
                      L.append("")

              L += ["---","",
                    "> ⚠️ **Disclaimer:** Historical probability analysis only. Not financial advice.",
                    "> Past patterns do not guarantee future results. Apply proper risk management.",
                    "",f"*CryptoStat Probability Engine — {now.strftime('%Y-%m-%d %H:%M:%S UTC')}*"]
              return "\n".join(L)

          report_md = build_report()
          json_out  = {
              "meta":{"symbol":SYMBOL,"pivot_tf":PIVOT_TF,"candle_tf":CANDLE_TF,
                      "lookback":LOOKBACK,"days":lookback_days,"samples":len(labeled),
                      "generated":now.isoformat(),"auth_api":bool(API_KEY)},
              "current_candle":{"start":cs.isoformat(),"elapsed_mins":round(elapsed_mins,1),
                                "elapsed_pct":round(elapsed_pct,1),"price":current_price,
                                "high":cur_high,"low":cur_low,"range_pct":round(cur_rng,3),
                                "p1_type":cur_p1,"p1_confirmed":p1_ok},
              "time_analysis":  tr if ANALYSIS_TYPE in ("time","complete")     else None,
              "distance_stats": ds if ANALYSIS_TYPE in ("distance","complete") else None,
              "summary":{"p2_remaining_pct":round(p2rem,1)} if ANALYSIS_TYPE in ("summary","complete") else None,
          }

          os.makedirs("reports", exist_ok=True)
          ts_str = now.strftime("%Y%m%d_%H%M%S")
          base   = f"reports/{SYMBOL}_{PIVOT_TF}_{LOOKBACK}_{ts_str}"

          if OUTPUT_FORMAT in ("markdown","both"):
              with open(f"{base}.md","w",encoding="utf-8") as f: f.write(report_md)
              print(f"\n  Markdown saved: {base}.md")
          if OUTPUT_FORMAT in ("json","both"):
              with open(f"{base}.json","w",encoding="utf-8") as f:
                  json.dump(json_out,f,indent=2,default=str)
              print(f"  JSON saved    : {base}.json")

          print(f"\n{'='*60}")
          print(report_md)
          print(f"{'='*60}\n")
          PYEOF

      # ── 5. RUN ANALYSIS ───────────────────────────────────────────────────────
      - name: Run Probability Analysis
        env:
          SYMBOL:          ${{ github.event.inputs.symbol }}
          CANDLE_TF:       ${{ github.event.inputs.candle_timeframe }}
          PIVOT_TF:        ${{ github.event.inputs.pivot_timeframe }}
          LOOKBACK:        ${{ github.event.inputs.lookback_period }}
          ANALYSIS_TYPE:   ${{ github.event.inputs.analysis_type }}
          OUTPUT_FORMAT:   ${{ github.event.inputs.output_format }}
          # API key: manual input takes priority, then repo secret, then empty (public mode)
          BINANCE_API_KEY: ${{ github.event.inputs.binance_api_key || secrets.BINANCE_API_KEY || '' }}
        run: python /tmp/analyze.py

      # ── 6. UPLOAD REPORT ARTIFACT ────────────────────────────────────────────
      - name: Upload Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ${{ github.event.inputs.symbol }}-${{ github.event.inputs.pivot_timeframe }}-${{ github.event.inputs.lookback_period }}-${{ github.run_id }}
          path: reports/
          retention-days: 30

      # ── 7. WRITE JOB SUMMARY ──────────────────────────────────────────────────
      - name: Write Summary
        if: always()
        run: |
          echo "## 📊 Crypto Probability Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Param | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Symbol | \`${{ github.event.inputs.symbol }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Pivot TF | \`${{ github.event.inputs.pivot_timeframe }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Sub-Candle TF | \`${{ github.event.inputs.candle_timeframe }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Lookback | \`${{ github.event.inputs.lookback_period }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Analysis | \`${{ github.event.inputs.analysis_type }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📁 Full report available in **Artifacts** above." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if ls reports/*.md 1>/dev/null 2>&1; then
            echo "---" >> $GITHUB_STEP_SUMMARY
            cat reports/*.md >> $GITHUB_STEP_SUMMARY
          fi
