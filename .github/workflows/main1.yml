          def _is_address_bar_control(ctrl):
              try:
                  wt  = (ctrl.window_text() or "").lower().strip()
                  aid = ""
                  cls = ""
                  try:
                      aid = (ctrl.element_info.automation_id or "").lower()
                  except Exception:
                      pass
                  try:
                      cls = (ctrl.element_info.class_name or "").lower()
                  except Exception:
                      pass
                  for name in ADDRESS_BAR_NAMES:
                      if name in wt or name in aid:
                          return True
                  for aid_kw in ADDRESS_BAR_AUTOMATION_IDS:
                      if aid_kw.lower() in aid:
                          return True
                  if "omnibox" in cls or "addressbar" in cls:
                      return True
              except Exception:
                  pass
              return False

          def _matches_any(text, keyword_list):
              if not text:
                  return False
              tl = text.lower().strip()
              return any(kw.lower() in tl for kw in keyword_list)

          def _matches_any_exact_start(text, keyword_list):
              if not text:
                  return False
              tl = text.lower().strip()
              for kw in keyword_list:
                  kwl = kw.lower().strip()
                  if tl == kwl or tl.startswith(kwl):
                      return True
              return False

          def _is_proxy_auth_dialog(window_text):
              if not window_text:
                  return False
              return _matches_any(window_text, PROXY_AUTH_TITLE_KEYWORDS)

          def _find_username_fields(container):
              results =[]
              try:
                  all_edits = container.descendants(control_type="Edit")
                  for ctrl in all_edits:
                      if _is_address_bar_control(ctrl):
                          continue
                      try:
                          wt = ctrl.window_text() or ""
                      except Exception:
                          wt = ""
                      try:
                          name = ctrl.element_info.name or ""
                      except Exception:
                          name = ""
                      label = (wt + " " + name).lower()
                      if _matches_any(label, USERNAME_FIELD_KEYWORDS):
                          results.append(ctrl)
              except Exception:
                  pass
              return results

          def _find_password_fields(container):
