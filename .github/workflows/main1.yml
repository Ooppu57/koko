      - name: Disable Windows Defender & Edge SmartScreen
        shell: pwsh
        run: |
          Write-Host "========== SYSTEM PREPARATION ==========" -ForegroundColor Cyan
          Write-Host "[Defender] Disabling Windows Defender Realtime Monitoring..." -ForegroundColor Yellow
          Set-MpPreference -DisableRealtimeMonitoring $true -ErrorAction SilentlyContinue
          Write-Host "[Defender] Disabling PUA Protection..." -ForegroundColor Yellow
          Set-MpPreference -PUAProtection 0 -ErrorAction SilentlyContinue
          Write-Host "[Defender] Disabling BlockAtFirstSeen..." -ForegroundColor Yellow
          Set-MpPreference -DisableBlockAtFirstSeen $true -ErrorAction SilentlyContinue
          Write-Host "[Defender] Disabling IOAV Protection..." -ForegroundColor Yellow
          Set-MpPreference -DisableIOAVProtection $true -ErrorAction SilentlyContinue

          Write-Host "[Registry] Enforcing Edge SmartScreen bypass policies..." -ForegroundColor Cyan
          $edgePolicy = "HKLM:\SOFTWARE\Policies\Microsoft\Edge"
          if (-not (Test-Path $edgePolicy)) { New-Item -Path $edgePolicy -Force | Out-Null; Write-Host "[Registry] Created $edgePolicy" }
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "SmartScreenPuaEnabled" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "DownloadRestrictions" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverride" -Value 0
          Set-ItemProperty -Path $edgePolicy -Name "PreventSmartScreenPromptOverrideForFiles" -Value 0

          $exemptPath = "$edgePolicy\ExemptDomainFileTypePairsFromFileTypeDownloadWarnings"
          if (-not (Test-Path $exemptPath)) { New-Item -Path $exemptPath -Force | Out-Null }
          Set-ItemProperty -Path $exemptPath -Name "1" -Value '{"domains":["*"],"file_extension":"exe"}'
          Write-Host "[Registry] Edge EXEs whitelisted from all warnings." -ForegroundColor Green

      - name: Apply Proxy-Matched Locale, Timezone & Language
        shell: pwsh
        run: |
          $tz      = $env:TIMEZONE_WINDOWS
          $locale  = $env:WINDOWS_LOCALE
          $kb      = $env:WINDOWS_KEYBOARD
          $country = $env:PROXY_COUNTRY_CODE
          $city    = $env:PROXY_CITY
          $region  = $env:PROXY_REGION
          $realIp  = $env:PROXY_REAL_IP
          $tzIana  = $env:TIMEZONE_IANA

          Write-Host "============================================================" -ForegroundColor Cyan
          Write-Host " Locale Alignment Engine" -ForegroundColor Cyan
          Write-Host " Real Proxy IP   : $realIp" -ForegroundColor Gray
          Write-Host " Location        : $city, $region, $country" -ForegroundColor Gray
          Write-Host " IANA Timezone   : $tzIana" -ForegroundColor Gray
          Write-Host " Windows TZ      : $tz" -ForegroundColor Gray
          Write-Host " Windows Locale  : $locale" -ForegroundColor Gray
          Write-Host " Keyboard Layout : $kb" -ForegroundColor Gray
          Write-Host "============================================================" -ForegroundColor Cyan

          if ($tz -and $tz -ne "UTC") {
              try {
                  Set-TimeZone -Id $tz -ErrorAction Stop
                  Write-Host "[Locale] Timezone set to: $tz" -ForegroundColor Green
              } catch {
                  Write-Host "[Locale] WARNING: Could not set timezone '$tz': $_" -ForegroundColor Yellow
                  try {
                      tzutil /s "$tz"
                      Write-Host "[Locale] Timezone set via tzutil: $tz" -ForegroundColor Green
                  } catch {
                      Write-Host "[Locale] tzutil also failed. Skipping timezone change." -ForegroundColor Red
                  }
              }
          } else {
              Write-Host "[Locale] Timezone is UTC or unset — skipping." -ForegroundColor DarkGray
          }

          try {
              Set-WinSystemLocale -SystemLocale $locale -ErrorAction Stop
              Write-Host "[Locale] System locale set to: $locale" -ForegroundColor Green
          } catch {
              Write-Host "[Locale] WARNING: Set-WinSystemLocale failed for '$locale': $_" -ForegroundColor Yellow
          }

          try {
              Set-WinUILanguageOverride -Language $locale -ErrorAction Stop
              Write-Host "[Locale] UI language override set to: $locale" -ForegroundColor Green
          } catch {
              Write-Host "[Locale] WARNING: Set-WinUILanguageOverride failed for '$locale': $_" -ForegroundColor Yellow
          }

          $geoMap = @{
              "US"="244"; "GB"="242"; "CA"="39"; "AU"="12"; "DE"="94";
              "FR"="84"; "BR"="32"; "MX"="166"; "ES"="217"; "VN"="251";
              "CH"="223"; "ID"="111"; "IT"="118"; "NL"="176"; "PL"="191";
              "AR"="11"; "CL"="46"; "CO"="51"; "IN"="113"; "JP"="122";
              "KR"="134"; "CN"="45"; "TW"="237"; "RU"="203"; "TR"="235";
              "SA"="205"; "AE"="224"; "ZA"="209"; "NG"="178"; "KE"="129";
              "PH"="185"; "TH"="227"; "MY"="167"; "SG"="215"; "HK"="104";
              "PT"="193"; "RO"="200"; "HU"="109"; "CZ"="75"; "SK"="214";
              "UA"="241"; "GR"="98"; "SE"="221"; "NO"="177"; "DK"="61";
              "FI"="77"; "BE"="21"; "AT"="14"; "NZ"="183"; "IE"="110";
          }
          $geoId = $geoMap[$country]
          if ($geoId) {
              try {
                  Set-WinHomeLocation -GeoId ([int]$geoId) -ErrorAction Stop
                  Write-Host "[Locale] Home location (GeoID) set to: $country ($geoId)" -ForegroundColor Green
              } catch {
                  Write-Host "[Locale] WARNING: Set-WinHomeLocation failed: $_" -ForegroundColor Yellow
              }
          } else {
              Write-Host "[Locale] No GeoID mapping found for '$country' — skipping home location." -ForegroundColor DarkGray
          }

          try {
              $langList = New-WinUserLanguageList $locale -ErrorAction Stop
              if ($kb -and $kb -ne "") {
                  $langList[0].InputMethodTips.Clear()
                  $langList[0].InputMethodTips.Add($kb)
              }
              Set-WinUserLanguageList $langList -Force -ErrorAction Stop
              Write-Host "[Locale] User language list set: $locale | Keyboard: $kb" -ForegroundColor Green
          } catch {
              Write-Host "[Locale] WARNING: Set-WinUserLanguageList failed: $_" -ForegroundColor Yellow
          }

          try {
              w32tm /resync /force 2>&1 | Out-Null
              Write-Host "[Locale] System clock synced via w32tm." -ForegroundColor Green
          } catch {
              Write-Host "[Locale] w32tm sync failed (non-critical)." -ForegroundColor DarkGray
          }

          $localeEnvPath = "$env:TEMP\proxy_locale.env"
          @"
          LOCALE=$locale
          KEYBOARD=$kb
          COUNTRY=$country
          TIMEZONE_WIN=$tz
          REAL_IP=$realIp
          "@ | Out-File -FilePath $localeEnvPath -Encoding utf8
          Write-Host "[Locale] Locale metadata written to: $localeEnvPath" -ForegroundColor DarkGray
          Write-Host "[Locale] ✓ All locale adjustments applied for $country ($locale / $tz)" -ForegroundColor Green

      - name: Install and Start Getscreen.me (Windows)
        shell: pwsh
        run: |
          Write-Host "========== REMOTE ACCESS AGENT ==========" -ForegroundColor Cyan
          Write-Host "[Getscreen] Starting MSI download from getscreen.me..."
          $MaxRetries = 3
          $RetryCount = 0
          $Success = $false
          while (-not $Success -and $RetryCount -lt $MaxRetries) {
              try {
                  Invoke-WebRequest -Uri "https://getscreen.me/download/getscreen.msi" -OutFile "getscreen.msi" -ErrorAction Stop
                  if ((Get-Item "getscreen.msi").length -gt 1MB) {
                      $Success = $true
                      Write-Host "[Getscreen] Download successful." -ForegroundColor Green
                  } else {
                      Write-Host "[Getscreen] Downloaded file too small. Retrying ($RetryCount/$MaxRetries)..." -ForegroundColor Yellow
                      Start-Sleep -Seconds 5; $RetryCount++
                  }
              } catch {
                  Write-Host "[Getscreen] Connection error. Retrying ($RetryCount/$MaxRetries)..." -ForegroundColor Red
                  Start-Sleep -Seconds 5; $RetryCount++
              }
          }
          if (-not $Success) { Write-Host "[Getscreen] Failed to download agent. Exiting."; exit 1 }

          Write-Host "[Getscreen] Executing silent install for account: ${{ matrix.email }}"
          $InstallArgs = "/i getscreen.msi /qn REGISTER=`"${{ matrix.email }}`" CONFIG=`"name='$env:DEVICE_NAME' autostart=true nonadmin=true control=true disable_confirmation=true`""
          Start-Process msiexec.exe -Wait -ArgumentList $InstallArgs
          Write-Host "[Getscreen] Agent configured and running in background." -ForegroundColor Green

      - name: Setup Auto-Downloader & Software Installation
        shell: pwsh
        env:
          TARGET_URL: ${{ matrix.target_url }}
          SOFTWARE_TYPE: ${{ matrix.software_type }}
