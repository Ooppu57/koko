name: Parallel Windows Auto-Installer m1

on:
  workflow_dispatch:
    inputs:
      os_version:
        description: 'Select OS Runner Version'
        required: true
        type: choice
        options:
          - 'windows-2025'
          - 'windows-2022'
          - 'windows-11-arm'
        default: 'windows-2025'
      getscreen_email:
        description: 'Getscreen.me Account Email'
        required: true
        type: string
        default: 'KUKO@ccmail.online'
      num_devices:
        description: 'Number of Devices to Spawn (Concurrency)'
        required: true
        type: choice
        options:
          - '1'
          - '2'
          - '3'
          - '4'
          - '5'
        default: '1'
      num_installs:
        description: 'Number of Installs'
        required: true
        type: string
        default: ''
      num_clicks:
        description: 'Number of Clicks'
        required: true
        type: string
        default: ''
      software_choice:
        description: 'Select Software & Link'
        required: true
        type: choice
        options:
          - 'AVG - Orderflowz'
          - 'Opera - Tufayl'
        default: 'Opera - Tufayl'
      manual_software_url:
        description: 'Manual Software URL'
        required: false
        type: string
        default: ''
      run_manual_link:
        description: 'Run manual link'
        required: true
        type: boolean
        default: false
      scrapeops_api_key:
        description: 'ScrapeOps / FloppyData / Manual Proxies'
        required: false
        type: string
        default: ''
      use_without_proxy:
        description: 'Run without proxy'
        required: true
        type: boolean
        default: false
      proxy_country:
        description: 'Proxy Country Geotargeting'
        required: true
        type: choice
        options:
          - 'USA'
          - 'UK'
          - 'Canada'
          - 'Australia'
          - 'Germany'
          - 'France'
          - 'Brazil'
          - 'Mexico'
          - 'Spain'
          - 'Vietnam'
          - 'Switzerland'
          - 'Indonesia'
          - 'Italy'
          - 'Netherlands'
          - 'Poland'
        default: 'Brazil'
      mobile_proxies:
        description: 'Use Mobile Proxies'
        required: true
        type: boolean
        default: false
      sticky_sessions:
        description: 'Enable Unique Sticky Sessions'
        required: true
        type: boolean
        default: true

permissions:
  actions: write
  contents: write

jobs:
  prepare_matrix:
    name: Check Inputs & Prepare Runners
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has_tasks: ${{ steps.set-matrix.outputs.has_tasks }}
    steps:
      - name: Generate Dynamic Matrix Queue
        id: set-matrix
        shell: python
        env:
          EMAIL: ${{ inputs.getscreen_email }}
          NUM_INSTALLS: ${{ inputs.num_installs }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          OS_VERSION: ${{ inputs.os_version }}
          SOFTWARE_CHOICE: ${{ inputs.software_choice }}
          MANUAL_URL: ${{ inputs.manual_software_url }}
          RUN_MANUAL: ${{ inputs.run_manual_link }}
        run: |
          import os, json, random

          print("========== INITIALIZING MATRIX GENERATION ==========")

          try:
              num_installs = int(os.environ.get("NUM_INSTALLS", "5"))
          except ValueError:
              num_installs = 5
              
          try:
              num_clicks = int(os.environ.get("NUM_CLICKS", "1"))
          except ValueError:
              num_clicks = 1
          
          tasks_total = num_installs + num_clicks

          if tasks_total == 0:
              print("No tasks configured (installs=0, clicks=0). Exiting.")
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("matrix={\"include\":[]}\n")
                  f.write("has_tasks=false\n")
              exit(0)
          else:
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("has_tasks=true\n")

          action_list = ["install"] * num_installs + ["click"] * num_clicks
          random.shuffle(action_list)

          print(f"[Action Matrix] Total Tasks Queued: {tasks_total}")
          print(f"[Action Matrix] Randomized Queue  : {action_list}")

          run_manual = os.environ.get("RUN_MANUAL", "false").lower() == "true"
          manual_url_input = os.environ.get("MANUAL_URL", "").strip()
          manual_url = manual_url_input if run_manual else ""
          software_choice = os.environ.get("SOFTWARE_CHOICE", "Opera - Tufayl")
          os_version = os.environ.get("OS_VERSION", "windows-2025")
          email = os.environ.get("EMAIL", "").strip()

          avg_urls = {
              "AVG - Orderflowz": "https://u.to/a-flowz/o0d4Ig",
          }
          opera_urls = {
              "Opera - Tufayl": "https://u.to/tufaylxsmrt/sHSSIg",
          }
          opera_one_urls = {}
          ad_mvn_urls = {}
          
          all_urls = {**avg_urls, **opera_urls, **opera_one_urls, **ad_mvn_urls}
          dynamic_links =["Opera - Tufayl"]

          if manual_url:
              target_url = manual_url
              software_type = "dynamic_opera"
              exe_filter = "*.exe"
          else:
              target_url = all_urls.get(software_choice, avg_urls.get("AVG - Orderflowz", "https://u.to/a-flowz/o0d4Ig"))
              if software_choice in dynamic_links:
                  software_type = "opera_smart_link"
                  exe_filter = "*Opera*Setup*.exe"
              elif software_choice.startswith("Ad-MVN"):
                  software_type = "dynamic_opera"
                  exe_filter = "*Opera*Setup*.exe"
              elif software_choice.startswith("OperaGX"):
                  software_type = "opera_gx"
                  exe_filter = "OperaGXSetup*.exe"
              elif software_choice.startswith("Opera-One"):
                  software_type = "opera_one"
                  exe_filter = "OperaSetup*.exe"
              else:
                  software_type = "avg"
                  exe_filter = "*avg*.exe"

          def short_os(os_ver):
              if os_ver == "windows-2025": return "W25"
              elif os_ver == "windows-2022": return "W22"
              elif os_ver == "windows-11-arm": return "W11A"
              return "W" + os_ver.replace("windows-", "").replace("-", "")

          def short_software(choice):
              prefix_map = {"OperaGX": "OPX", "Opera-One": "OPO", "Ad-MVN": "MVN", "AVG": "AVG", "Opera": "OP"}
              for key, prefix in prefix_map.items():
                  if choice.startswith(key):
                      parts = choice.split(" - ", 1)
                      list_name = parts[1].replace(" ", "") if len(parts) > 1 else ""
                      return f"{prefix}-{list_name}"
              return choice.replace(" ", "").replace("-", "")

          short_os_tag = short_os(os_version)
          short_sw_tag = "MANUAL" if manual_url else short_software(software_choice)

          includes =[]
          for i in range(tasks_total):
              action_mode = action_list[i]
              absolute_idx = i + 1
              
              includes.append({
                  "task_index":      absolute_idx,
                  "absolute_idx":    absolute_idx,
                  "email":           email,
                  "os":              os_version,
                  "target_url":      target_url,
                  "software_type":   software_type,
                  "exe_filter":      exe_filter,
                  "action_mode":     action_mode,
                  "short_os_tag":    short_os_tag,
                  "short_sw_tag":    short_sw_tag
              })
              print(f"[Task Queued] Task {absolute_idx} | Action={action_mode}")

          if not includes:
              print("Error: Valid configuration could not be generated. Exiting.")
              exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"matrix={json.dumps({'include': includes})}\n")
          print("========== MATRIX GENERATION COMPLETE ==========")

  remote_session:
    name: Task ${{ matrix.absolute_idx }} (${{ matrix.action_mode }})
    needs: prepare_matrix
    if: needs.prepare_matrix.outputs.has_tasks == 'true'
    runs-on: ${{ matrix.os }}
    timeout-minutes: 6

    strategy:
      fail-fast: false
      max-parallel: ${{ fromJSON(inputs.num_devices) }}
      matrix: ${{ fromJson(needs.prepare_matrix.outputs.matrix) }}

    steps:
      - name: Runner Proxy & Identity Provisioning
        shell: python
        env:
          API_KEY_INPUT: ${{ inputs.scrapeops_api_key }}
          WITHOUT_PROXY: ${{ inputs.use_without_proxy }}
          COUNTRY: ${{ inputs.proxy_country }}
          MOBILE: ${{ inputs.mobile_proxies }}
          STICKY: ${{ inputs.sticky_sessions }}
          TASK_INDEX: ${{ matrix.task_index }}
          ABSOLUTE_IDX: ${{ matrix.absolute_idx }}
          NUM_INSTALLS: ${{ inputs.num_installs }}
          NUM_CLICKS: ${{ inputs.num_clicks }}
          SHORT_OS: ${{ matrix.short_os_tag }}
          SHORT_SW: ${{ matrix.short_sw_tag }}
          ACTION: ${{ matrix.action_mode }}
        run: |
          import os, time, sys, uuid, json, re
          
          try:
              import requests
          except ImportError:
              import subprocess
              subprocess.check_call([sys.executable, "-m", "pip", "install", "requests", "--quiet"])
              import requests

          proxy_input = os.environ.get("API_KEY_INPUT", "").strip()
          without_proxy = os.environ.get("WITHOUT_PROXY", "false").lower() == "true"
          country_input = os.environ.get("COUNTRY", "USA")
          mobile = os.environ.get("MOBILE", "false").lower() == "true"
          sticky = os.environ.get("STICKY", "false").lower() == "true"
          absolute_idx = int(os.environ.get("ABSOLUTE_IDX", "1")) - 1 # 0-indexed globally
          task_index = int(os.environ.get("TASK_INDEX", "1"))
          
          try:
              num_installs = int(os.environ.get("NUM_INSTALLS", "0"))
          except ValueError:
              num_installs = 0
              
          try:
              num_clicks = int(os.environ.get("NUM_CLICKS", "0"))
          except ValueError:
              num_clicks = 0
              
          tasks_total = num_installs + num_clicks
          
          short_os = os.environ.get("SHORT_OS", "OS")
          short_sw = os.environ.get("SHORT_SW", "SW")
          action_cap = os.environ.get("ACTION", "task").capitalize()

          # Geography mappings
          country_map = {
              "USA": "us", "UK": "uk", "Canada": "ca", "Australia": "au", "Germany": "de", "France": "fr",
              "Brazil": "br", "Mexico": "mx", "Spain": "es", "Vietnam": "vn", "Switzerland": "ch", "Indonesia": "id",
              "Italy": "it", "Netherlands": "nl", "Poland": "pl"
          }
          cc_input = country_map.get(country_input, "us")
          
          fallback_tz_map = {
              "US": "America/New_York", "GB": "Europe/London", "CA": "America/Toronto", "AU": "Australia/Sydney", "DE": "Europe/Berlin", "FR": "Europe/Paris", "BR": "America/Sao_Paulo", "MX": "America/Mexico_City", "ES": "Europe/Madrid", "VN": "Asia/Ho_Chi_Minh", "CH": "Europe/Zurich", "ID": "Asia/Jakarta", "IT": "Europe/Rome", "NL": "Europe/Amsterdam", "PL": "Europe/Warsaw"
          }

          def country_code_to_locale(cc):
              _map = {"US": "en-US", "GB": "en-GB", "CA": "en-CA", "AU": "en-AU", "DE": "de-DE", "FR": "fr-FR", "BR": "pt-BR", "MX": "es-MX", "ES": "es-ES", "VN": "vi-VN", "CH": "de-CH", "ID": "id-ID", "IT": "it-IT", "NL": "nl-NL", "PL": "pl-PL"}
              return _map.get(cc.upper(), "en-US")

          def country_code_to_keyboard(cc):
              _map = {"US": "0409:00000409", "GB": "0809:00000809", "CA": "1009:00000409", "AU": "0C09:00000409", "DE": "0407:00000407", "FR": "040C:0000040C", "BR": "0416:00000416", "MX": "080A:0000080A", "ES": "0C0A:0000080A", "VN": "042A:0000042A", "CH": "0807:00000807", "ID": "0421:00000409", "IT": "0410:00000410", "NL": "0413:00020409", "PL": "0415:00000415"}
              return _map.get(cc.upper(), "0409:00000409")

          def tz_to_windows_tz(iana_tz):
              _map = {"America/New_York": "Eastern Standard Time", "America/Chicago": "Central Standard Time", "America/Denver": "Mountain Standard Time", "America/Phoenix": "US Mountain Standard Time", "America/Los_Angeles": "Pacific Standard Time", "America/Toronto": "Eastern Standard Time", "America/Sao_Paulo": "E. South America Standard Time", "America/Mexico_City": "Central Standard Time (Mexico)", "Europe/London": "GMT Standard Time", "Europe/Paris": "Romance Standard Time", "Europe/Berlin": "W. Europe Standard Time", "Europe/Madrid": "Romance Standard Time", "Europe/Rome": "W. Europe Standard Time", "Europe/Amsterdam": "W. Europe Standard Time", "Europe/Warsaw": "Central European Standard Time", "Asia/Ho_Chi_Minh": "SE Asia Standard Time", "Europe/Zurich": "W. Europe Standard Time", "Asia/Jakarta": "SE Asia Standard Time", "Australia/Sydney": "AUS Eastern Standard Time"}
              return _map.get(iana_tz, "UTC")

          def parse_proxy(proxy_str):
              original = proxy_str.strip()
              if not original: return None
              protocol = 'http'
              rest = original
              if '://' in rest:
                  protocol, rest = rest.split('://', 1)
                  if protocol.lower() == 'geolocation':
                      protocol = 'http'

              floppy_match = re.match(r'^([^:]+):([^@]+)@([^:]+):(\d+):(.+)$', rest)
              if floppy_match:
                  user, pwd, host, port, country_extra = floppy_match.groups()
                  country = country_extra.split(' - ')[0].strip()
                  return {'original': original, 'protocol': protocol, 'username': user, 'password': pwd, 'host': host, 'port': int(port), 'server': f"{host}:{port}", 'country_name': country, 'country_code': None, 'url': f"http://{user}:{pwd}@{host}:{port}"}

              std_match = re.match(r'^([^:]+):([^@]+)@([^:]+):(\d+)$', rest)
              if std_match:
                  user, pwd, host, port = std_match.groups()
                  return {'original': original, 'protocol': protocol, 'username': user, 'password': pwd, 'host': host, 'port': int(port), 'server': f"{host}:{port}", 'country_name': None, 'country_code': None, 'url': f"{protocol}://{user}:{pwd}@{host}:{port}"}

              alt_match = re.match(r'^([^:]+):(\d+):([^:]+):(.+)$', rest)
              if alt_match:
                  host, port, user, pwd = alt_match.groups()
                  return {'original': original, 'protocol': protocol, 'username': user, 'password': pwd, 'host': host, 'port': int(port), 'server': f"{host}:{port}", 'country_name': None, 'country_code': None, 'url': f"{protocol}://{user}:{pwd}@{host}:{port}"}

              simple_match = re.match(r'^([^:]+):(\d+)$', rest)
              if simple_match:
                  host, port = simple_match.groups()
                  return {'original': original, 'protocol': protocol, 'username': '', 'password': '', 'host': host, 'port': int(port), 'server': f"{host}:{port}", 'country_name': None, 'country_code': None, 'url': f"{protocol}://{host}:{port}"}

              return None

          def validate_proxy(pinfo):
              try:
                  proxies_cfg = {"http": pinfo['url'], "https": pinfo['url']}
                  resp = requests.get("https://ipinfo.io/json", proxies=proxies_cfg, timeout=12)
                  if resp.status_code == 200:
                      data = resp.json()
                      if "ip" in data:
                          cc = data.get("country") or "US"
                          tz = data.get("timezone") or "UTC"
                          return {
                              **pinfo,
                              'working': True, 'country_code': cc, 'country_name': data.get('region') or cc, 'ip': data.get("ip") or 'unknown', 
                              'city': data.get("city") or "", 'region': data.get("region") or "", 'timezone_iana': tz, 
                              'timezone_windows': tz_to_windows_tz(tz), 'windows_locale': country_code_to_locale(cc), 
                              'windows_keyboard': country_code_to_keyboard(cc)
                          }
              except Exception as e:
                  print(f"ipinfo.io check failed: {e}")

              try:
                  proxies_cfg = {"http": pinfo['url'], "https": pinfo['url']}
                  resp = requests.get('http://ip-api.com/json/', proxies=proxies_cfg, timeout=12)
                  if resp.status_code == 200:
                      data = resp.json()
                      if data.get('status') == 'success':
                          cc = data.get('countryCode') or 'US'
                          tz = data.get('timezone') or 'UTC'
                          return {
                              **pinfo,
                              'working': True, 'country_code': cc, 'country_name': data.get('country') or cc, 'ip': data.get('query') or 'unknown',
                              'city': data.get('city') or '', 'region': data.get('regionName') or '', 'timezone_iana': tz, 
                              'timezone_windows': tz_to_windows_tz(tz), 'windows_locale': country_code_to_locale(cc), 
                              'windows_keyboard': country_code_to_keyboard(cc)
                          }
              except Exception as e:
                  print(f"ip-api.com check failed: {e}")
                  
              return {'working': False, **pinfo}

          # Parse inputs into lists
          manual_proxies =[]
          scrapeops_keys =[]
          floppy_keys =[]
          
          if proxy_input and not without_proxy:
              SCRAPEOPS_KEY_RE = re.compile(r'^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$', re.IGNORECASE)
              FLOPPY_KEY_RE = re.compile(r'^[A-Za-z0-9_]{30,80}$')
              
              raw_items = proxy_input.split()
              for item in raw_items:
                  item = item.strip()
                  if not item: continue
                  if '://' in item or '@' in item or item.count(':') >= 2:
                      manual_proxies.append(item)
                  elif SCRAPEOPS_KEY_RE.match(item): 
                      scrapeops_keys.append(item)
                  elif FLOPPY_KEY_RE.match(item):
                      floppy_keys.append(item)
                  else:
                      scrapeops_keys.append(item)

          active_proxy = None
          use_proxy = False

          print(f"========== DEVICE PROXY INITIALIZATION ==========")
          print(f"Task Global Index: {task_index} / {tasks_total}")

          if without_proxy:
              print("Proxy disabled manually.")
          elif manual_proxies:
              print(f"[Manual Proxy] Assigning proxies using stride distribution (Total Proxies Provided: {len(manual_proxies)}, Total Tasks: {tasks_total})...")
              
              for attempt in range( (len(manual_proxies) // max(1, tasks_total)) + 1 ):
                  idx = absolute_idx + (attempt * tasks_total)
                  if idx >= len(manual_proxies):
                      break
                  
                  raw_p = manual_proxies[idx]
                  pinfo = parse_proxy(raw_p)
                  if not pinfo:
                      print(f"Skipping malformed proxy string at index {idx}: {raw_p}")
                      continue
                      
                  print(f"Testing manual proxy attempt {attempt + 1} (Array Index {idx}): {pinfo['server']}...")
                  
                  res = validate_proxy(pinfo)
                  if res['working']:
                      active_proxy = res
                      active_proxy['proxy_type_label'] = 'manual'
                      use_proxy = True
                      print(f"SUCCESS: Active manual proxy found -> IP: {res['ip']} | CC: {res['country_code']}")
                      break
                  else:
                      print("Proxy failed geography test or connection. Proceeding to next assigned proxy in stride mapping.")

          elif floppy_keys:
              FLOPPY_BASE = "https://client-api.floppy.host"
              proxy_type = "mobile" if mobile else "residential"
              
              for attempt in range(len(floppy_keys)):
                  key_idx = (absolute_idx // 15 + attempt) % len(floppy_keys)
                  current_key = floppy_keys[key_idx]
                  print(f"[FloppyData] Testing API Key ending in ...{current_key[-4:]} (Attempt {attempt+1})")
                  
                  try:
                      creds_resp = requests.get(f"{FLOPPY_BASE}/v1/rotating/smartParamsCredentials", headers={"X-Api-Key": current_key}, timeout=12)
                      if creds_resp.status_code != 200: continue
                      creds_data = creds_resp.json()
                      
                      params = {"type": proxy_type, "country": cc_input.upper(), "protocol": "http", "rotation": "0" if sticky else "-1"}
                      if sticky: params["session"] = f"t{task_index}_{str(uuid.uuid4())[:8]}"
                      
                      builder_resp = requests.get(f"{FLOPPY_BASE}/v1/rotating/smartParamsBuilder", headers={"X-Api-Key": current_key}, params=params, timeout=12)
                      b_data = builder_resp.json()
                      
                      user = b_data.get("username", creds_data.get("username", ""))
                      pwd = b_data.get("password", creds_data.get("password", ""))
                      host = b_data.get("host", "geo.g-w.info")
                      port = b_data.get("port", 10080)
                      
                      pinfo = {
                          'username': user, 'password': pwd, 'host': host, 'port': int(port),
                          'server': f"{host}:{port}", 'url': f"http://{user}:{pwd}@{host}:{port}"
                      }
                      
                      res = validate_proxy(pinfo)
                      if res['working']:
                          active_proxy = res
                          active_proxy['proxy_type_label'] = 'floppydata'
                          use_proxy = True
                          print(f"SUCCESS: FloppyData proxy active -> IP: {res['ip']} | CC: {res['country_code']}")
                          break
                  except Exception as e:
                      print(f"FloppyData error on this key: {e}")

          elif scrapeops_keys:
              for attempt in range(len(scrapeops_keys)):
                  # 1 API Key per 15 Tasks
                  key_idx = (absolute_idx // 15 + attempt) % len(scrapeops_keys)
                  current_key = scrapeops_keys[key_idx]
                  print(f"[ScrapeOps] Testing API Key ending in ...{current_key[-4:]} (Attempt {attempt+1})")
                  
                  proxy_user = f"scrapeops.country={cc_input}"
                  if mobile: proxy_user += ".mobile=true"
                  if sticky: proxy_user += f".sticky_session=t{task_index}{str(uuid.uuid4())[:4]}"
                  
                  pinfo = {
                      'username': proxy_user, 'password': current_key, 'host': 'residential-proxy.scrapeops.io',
                      'port': 8181, 'server': 'residential-proxy.scrapeops.io:8181', 
                      'url': f"http://{proxy_user}:{current_key}@residential-proxy.scrapeops.io:8181"
                  }
                  
                  res = validate_proxy(pinfo)
                  if res['working']:
                      active_proxy = res
                      active_proxy['proxy_type_label'] = 'scrapeops'
                      use_proxy = True
                      print(f"SUCCESS: ScrapeOps proxy active -> IP: {res['ip']} | CC: {res['country_code']}")
                      break
                  else:
                      if attempt == len(scrapeops_keys) - 1:
                          print("WARNING: All ScrapeOps keys failed geography ping. Forcing application of last key as fallback.")
                          fallback_cc = cc_input.upper()
                          fallback_iana = fallback_tz_map.get(fallback_cc, "UTC")
                          active_proxy = {
                              **pinfo,
                              'working': True, 'country_code': fallback_cc, 'country_name': country_input, 'ip': 'unknown',
                              'city': '', 'region': '', 'timezone_iana': fallback_iana, 'timezone_windows': tz_to_windows_tz(fallback_iana),
                              'windows_locale': country_code_to_locale(fallback_cc), 'windows_keyboard': country_code_to_keyboard(fallback_cc)
                          }
                          active_proxy['proxy_type_label'] = 'scrapeops'
                          use_proxy = True

          # Default Fallback if completely proxy-less
          if not active_proxy:
              active_proxy = {
                  'server': '', 'username': '', 'password': '', 'proxy_type_label': 'none',
                  'country_code': 'US', 'city': '', 'region': '', 'ip': 'direct',
                  'timezone_windows': 'UTC', 'timezone_iana': 'UTC',
                  'windows_locale': 'en-US', 'windows_keyboard': '0409:00000409'
              }

          cc_final = (active_proxy.get('country_code') or 'US').upper()
          device_name = f"T{task_index}-{short_os}-{short_sw}-{action_cap}-{cc_final}"
          print(f"Assigned Identity: {device_name}")

          env_file = os.environ.get('GITHUB_ENV')
          with open(env_file, 'a', encoding='utf-8') as f:
              f.write(f"PROXY_SERVER={active_proxy.get('server', '')}\n")
              f.write(f"PROXY_USER={active_proxy.get('username', '')}\n")
              f.write(f"PROXY_PASS={active_proxy.get('password', '')}\n")
              f.write(f"PROXY_TYPE={active_proxy.get('proxy_type_label', 'none')}\n")
              f.write(f"USE_PROXY={'true' if use_proxy else 'false'}\n")
              f.write(f"PROXY_COUNTRY_CODE={cc_final}\n")
              f.write(f"PROXY_CITY={active_proxy.get('city', '')}\n")
