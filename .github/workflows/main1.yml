          def find_download_button_multilingual(edge_window, software_type, label=""):
              if edge_window is None:
                  return None, None

              if software_type in["opera_gx", "opera_one", "opera_smart_link",
                                    "dynamic_opera", "ad_mvn"]:
                  primary_keywords = OPERA_DOWNLOAD_KEYWORDS
                  brand_label = "Opera"
              elif software_type == "avg":
                  primary_keywords = AVG_DOWNLOAD_KEYWORDS
                  brand_label = "AVG"
              else:
                  primary_keywords = UNIVERSAL_DOWNLOAD_KEYWORDS
                  brand_label = "Generic"

              # Strategy 1: Brand-specific Button match
              try:
                  for btn in edge_window.descendants(control_type="Button"):
                      try:
                          txt = (btn.window_text() or "").strip()
                      except Exception:
                          txt = ""
                      try:
                          name = (btn.element_info.name or "").strip()
                      except Exception:
                          name = ""
                      combined = (txt + " " + name).strip()
                      if combined and _matches_any(combined, primary_keywords):
                          log_msg("DL-Find", f"[{label}] Strategy1 ({brand_label} Button): '{combined[:60]}'")
                          return btn, f"s1-{brand_label}-button"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] Strategy1 scan error: {e}")

              # Strategy 2: Universal Button keyword match
              try:
                  for btn in edge_window.descendants(control_type="Button"):
                      try:
                          txt = (btn.window_text() or "").strip()
                      except Exception:
                          txt = ""
                      try:
                          name = (btn.element_info.name or "").strip()
                      except Exception:
                          name = ""
                      combined = (txt + " " + name).strip()
                      if combined and _matches_any(combined, UNIVERSAL_DOWNLOAD_KEYWORDS):
                          if len(combined) > 2:
                              log_msg("DL-Find", f"[{label}] Strategy2 (Universal Button): '{combined[:60]}'")
                              return btn, "s2-universal-button"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] Strategy2 scan error: {e}")

              # Strategy 3: Hyperlink / Text / Image with interstitial keywords
              try:
                  for el in edge_window.descendants():
                      try:
                          ctrl_type = el.element_info.control_type
                      except Exception:
                          continue
                      if ctrl_type not in ["Hyperlink", "Text", "Image"]:
                          continue
                      try:
                          wt = (el.window_text() or "").strip()
                      except Exception:
                          wt = ""
                      if not wt or len(wt) > 200:
                          continue
                      if "http" in wt.lower() or "www." in wt.lower():
                          continue
                      if _matches_any(wt, primary_keywords + INTERSTITIAL_LINK_KEYWORDS):
                          if len(wt) <= 80:
                              log_msg("DL-Find", f"[{label}] Strategy3 ({ctrl_type} link): '{wt[:60]}'")
                              return el, f"s3-{ctrl_type.lower()}-link"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] Strategy3 scan error: {e}")

              # Strategy 4: Broad last-resort scan
              try:
                  all_keywords_combined = list(set(
                      primary_keywords + UNIVERSAL_DOWNLOAD_KEYWORDS + INTERSTITIAL_LINK_KEYWORDS
                  ))
                  for el in edge_window.descendants():
                      try:
                          ctrl_type = el.element_info.control_type
                      except Exception:
                          continue
                      if ctrl_type not in["Button", "Hyperlink", "Text", "Image", "Custom"]:
                          continue
                      try:
                          wt = (el.window_text() or "").strip()
                      except Exception:
                          wt = ""
                      if not wt or len(wt) > 100:
                          continue
                      if "http" in wt.lower() or "www." in wt.lower():
                          continue
                      if _matches_any_exact_start(wt, all_keywords_combined):
                          log_msg("DL-Find", f"[{label}] Strategy4 (broad scan, {ctrl_type}): '{wt[:60]}'")
                          return el, f"s4-broad-{ctrl_type.lower()}"
              except Exception as e:
                  log_msg("DL-Find", f"[{label}] Strategy4 scan error: {e}")

              log_msg("DL-Find", f"[{label}] No download element found after all 4 strategies.")
              return None, None

          def click_download_button_multilingual(edge_window, software_type, label=""):
              element, strategy = find_download_button_multilingual(edge_window, software_type, label=label)
              if element is None:
                  return False

              try:
                  edge_window.set_focus()
                  time.sleep(0.4)
              except Exception:
                  pass

              try:
                  element.click_input()
                  log_msg("DL-Click", f"[{label}] click_input() succeeded via {strategy}.")
                  return True
              except Exception as e1:
                  log_msg("DL-Click", f"[{label}] click_input() failed: {e1}")

              try:
                  element.invoke()
                  log_msg("DL-Click", f"[{label}] invoke() succeeded via {strategy}.")
                  return True
              except Exception as e2:
                  log_msg("DL-Click", f"[{label}] invoke() failed: {e2}")

              try:
                  rect = element.rectangle()
                  cx = (rect.left + rect.right) // 2
                  cy = (rect.top + rect.bottom) // 2
                  pyautogui.moveTo(cx, cy, duration=0.25)
                  time.sleep(0.15)
                  pyautogui.click(cx, cy)
                  log_msg("DL-Click", f"[{label}] pyautogui click at ({cx},{cy}) succeeded via {strategy}.")
                  return True
              except Exception as e3:
                  log_msg("DL-Click", f"[{label}] pyautogui click failed: {e3}")

              log_msg("DL-Click", f"[{label}] All click strategies exhausted for element via {strategy}.")
              return False

